# Cloudflare deploy config — serves the static game client from dist/.
# Build first (`npm run build` → dist/), then `npx wrangler deploy`.
# account_id is intentionally omitted — wrangler infers it from CLOUDFLARE_API_TOKEN.
name = "gunscape"
compatibility_date = "2025-06-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
