<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gunscape Classic</title>
<style>
  :root{
    --bg:#1c1712; --panel:#2b2419; --panel2:#3a311f; --gold:#d9b65a;
    --txt:#e8dcc0; --dim:#9c8f73; --hp:#b23b2e; --xp:#5aa84c; --bad:#c0392b;
    --frame:#0d0a07;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--frame);
    font-family:"Trebuchet MS","Segoe UI",sans-serif;color:var(--txt);
    overflow:hidden;user-select:none;-webkit-user-select:none;}
  #wrap{display:flex;height:100vh;align-items:stretch;justify-content:center;gap:0;}
  #stage{position:relative;background:#000;flex:0 0 auto;}
  canvas{display:block;image-rendering:pixelated;background:#3c5a3c;cursor:crosshair;}
  /* ---- right side panel (RSC style) ---- */
  #side{width:300px;background:var(--panel);border-left:3px solid var(--frame);
    display:flex;flex-direction:column;min-width:300px;}
  #tabs{display:flex;flex-wrap:wrap;background:var(--frame);}
  .tab{flex:1 1 0;text-align:center;padding:8px 2px;font-size:12px;cursor:pointer;
    background:var(--panel2);border:1px solid var(--frame);color:var(--dim);font-weight:bold;}
  .tab.active{background:var(--gold);color:#1c1712;}
  #panelbody{flex:1;overflow-y:auto;padding:10px;}
  h2{margin:0 0 8px;font-size:15px;color:var(--gold);letter-spacing:1px;
    border-bottom:1px solid var(--panel2);padding-bottom:4px;}
  /* skills */
  .skillgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .skill{background:var(--panel2);border:1px solid var(--frame);border-radius:4px;
    padding:6px 8px;position:relative;cursor:help;}
  .skill .nm{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
  .skill .lv{font-size:20px;font-weight:bold;color:var(--gold);}
  .skill .lv small{font-size:12px;color:var(--dim);font-weight:normal;}
  .skill .bar{height:4px;background:#000;border-radius:2px;margin-top:4px;overflow:hidden;}
  .skill .bar i{display:block;height:100%;background:var(--xp);width:0%;}
  /* inventory */
  #invgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
  .slot{aspect-ratio:1;background:var(--panel2);border:1px solid var(--frame);
    border-radius:4px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;font-size:9px;text-align:center;padding:2px;cursor:pointer;
    position:relative;line-height:1.1;overflow:hidden;}
  .slot.full:hover{outline:2px solid var(--gold);}
  .slot .ic{font-size:20px;line-height:1;}
  .slot .qty{position:absolute;top:1px;right:3px;color:#ffd24a;font-size:9px;
    text-shadow:1px 1px 0 #000;font-weight:bold;}
  /* equipment */
  .eqrow{display:flex;justify-content:space-between;align-items:center;
    background:var(--panel2);border:1px solid var(--frame);border-radius:4px;
    padding:6px 8px;margin-bottom:5px;font-size:12px;}
  .eqrow b{color:var(--dim);font-weight:normal;}
  .eqrow span{color:var(--txt);font-weight:bold;text-align:right;}
  .statline{display:flex;justify-content:space-between;font-size:12px;
    padding:3px 2px;border-bottom:1px dotted var(--panel2);}
  .statline b{color:var(--dim);font-weight:normal;}
  /* shop */
  .shopitem{display:flex;justify-content:space-between;align-items:center;
    background:var(--panel2);border:1px solid var(--frame);border-radius:4px;
    padding:6px 8px;margin-bottom:5px;font-size:12px;gap:6px;}
  .shopitem .info{flex:1;}
  .shopitem .nm{font-weight:bold;color:var(--gold);}
  .shopitem .sub{font-size:10px;color:var(--dim);}
  .btn{background:var(--gold);color:#1c1712;border:none;border-radius:4px;
    padding:5px 10px;font-weight:bold;cursor:pointer;font-size:11px;}
  .btn:hover{background:#f0cf6b;}
  .btn.sell{background:#7a5a2a;color:#f0e0b0;}
  .btn:disabled{background:#5a5142;color:#8a8270;cursor:not-allowed;}
  /* chat / log */
  #chat{height:120px;background:rgba(0,0,0,.55);border-top:3px solid var(--frame);
    overflow-y:auto;padding:6px 10px;font-size:13px;line-height:1.45;}
  #chat .c-cmb{color:#ffd24a;}
  #chat .c-xp{color:#7fd06a;}
  #chat .c-loot{color:#7fbfff;}
  #chat .c-bad{color:#ff7a6a;}
  #chat .c-sys{color:#c9b88a;}
  /* topbar */
  #gold{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);
    padding:5px 12px;border-radius:6px;border:1px solid var(--gold);
    font-weight:bold;color:#ffd24a;font-size:14px;pointer-events:none;}
  #cmblvl{position:absolute;top:8px;left:140px;background:rgba(0,0,0,.6);
    padding:5px 12px;border-radius:6px;border:1px solid #b23b2e;
    font-weight:bold;color:#ff9b8a;font-size:14px;pointer-events:none;}
  #hint{position:absolute;bottom:8px;left:8px;right:8px;text-align:center;
    color:#cdbf9a;font-size:12px;background:rgba(0,0,0,.4);padding:4px;
    border-radius:6px;pointer-events:none;}
  /* tooltip */
  #tip{position:fixed;z-index:50;background:#0d0a07;border:1px solid var(--gold);
    border-radius:6px;padding:8px 10px;font-size:12px;max-width:240px;
    pointer-events:none;display:none;box-shadow:0 4px 16px rgba(0,0,0,.6);}
  #tip .tnm{color:var(--gold);font-weight:bold;margin-bottom:3px;}
  #tip .tline{color:#cdbf9a;font-size:11px;}
  #tip .tdesc{color:#9c8f73;font-style:italic;margin-top:4px;font-size:11px;}
  #ctx{position:fixed;z-index:60;background:#0d0a07;border:1px solid var(--gold);
    border-radius:5px;display:none;min-width:120px;overflow:hidden;}
  #ctx div{padding:7px 12px;font-size:12px;cursor:pointer;}
  #ctx div:hover{background:var(--gold);color:#1c1712;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:4px;}
  ::-webkit-scrollbar-track{background:var(--frame);}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="640" height="640"></canvas>
    <div id="gold">⛁ 25</div>
    <div id="cmblvl">⚔ Lvl 3</div>
    <div id="hint">Left-click ground to walk · Left-click an enemy to attack · Right-click items for options</div>
    <div id="chat"></div>
  </div>
  <div id="side">
    <div id="tabs">
      <div class="tab active" data-tab="skills">Skills</div>
      <div class="tab" data-tab="inv">Inventory</div>
      <div class="tab" data-tab="equip">Worn</div>
      <div class="tab" data-tab="shop">Shop</div>
    </div>
    <div id="panelbody"></div>
  </div>
</div>
<div id="tip"></div>
<div id="ctx"></div>

<script>
"use strict";
/* ============================================================ *
 *  GUNSCAPE CLASSIC — a RuneScape Classic-style game, but with
 *  guns instead of swords. Armour is cloth / cardboard / metal /
 *  kevlar. No "tiers" — just progressively stronger weapons, the
 *  AK-47 being the Dragon-axe equivalent.
 *
 *  Combat stats (the RS analogues):
 *    AIM       (was Attack)   -> lowers your weapon bloom (spread)
 *    COMPOSURE (was Strength) -> lowers chance to FLINCH when shot
 *    ARMOUR    (was Defence)  -> reduces enemy hit chance / damage
 *    VITALITY  (was Hitpoints)-> your health pool
 * ============================================================ */

/* ---------------- XP / level tables (RuneScape formula) ------- */
const XP_TABLE = (()=>{ const t=[0]; let pts=0;
  for(let lv=1; lv<99; lv++){ pts += Math.floor(lv + 300*Math.pow(2, lv/7)); t.push(Math.floor(pts/4)); }
  return t; })();
function levelForXp(xp){ let lv=1; for(let i=1;i<XP_TABLE.length;i++){ if(xp>=XP_TABLE[i]) lv=i+1; else break;} return Math.min(lv,99); }
function xpForLevel(lv){ return XP_TABLE[lv-1]||0; }

/* ---------------- Item / weapon / armour data ---------------- */
// Weapons: aim req gates use, fireRate ms between shots, bloom in "spread units"
// (higher = worse accuracy), dmg range, range in tiles.
const WEAPONS = {
  fists:    {name:"Bare Fists",   ic:"👊", req:1,  fireRate:1100, bloom:30, dmgMin:1, dmgMax:3,  range:1, price:0,    cat:"weapon", desc:"Your knuckles. Better find a gun."},
  zip:      {name:"Zip Pistol",   ic:"🔫", req:1,  fireRate:900,  bloom:26, dmgMin:2, dmgMax:6,  range:5, price:40,   cat:"weapon", desc:"A crude homemade pistol. Bronze-grade."},
  revolver: {name:"Revolver",     ic:"🔫", req:5,  fireRate:850,  bloom:20, dmgMin:4, dmgMax:9,  range:6, price:160,  cat:"weapon", desc:"Reliable iron sidearm. Steel-grade."},
  smg:      {name:"SMG",          ic:"🧨", req:15, fireRate:380,  bloom:22, dmgMin:3, dmgMax:8,  range:6, price:650,  cat:"weapon", desc:"Spits lead fast but sprays. Mithril-grade."},
  shotgun:  {name:"Shotgun",      ic:"💥", req:25, fireRate:1000, bloom:14, dmgMin:8, dmgMax:18, range:4, price:1800, cat:"weapon", desc:"Devastating up close. Adamant-grade."},
  rifle:    {name:"Hunting Rifle",ic:"🎯", req:35, fireRate:1200, bloom:6,  dmgMin:14,dmgMax:26, range:9, price:4200, cat:"weapon", desc:"Pinpoint long-range punch. Rune-grade."},
  ak:       {name:"AK-47",        ic:"⭐", req:45, fireRate:300,  bloom:10, dmgMin:12,dmgMax:24, range:7, price:12000,cat:"weapon", desc:"The legend. Fast, hard-hitting, iconic. Dragon-grade."},
};
// Armour: slot head/body/legs, material, armour bonus
const ARMOUR = {
  // cloth (lowest)
  cloth_hood: {name:"Cloth Hood",   ic:"🧢", slot:"head", armour:1, price:15,  cat:"armour", mat:"Cloth",     desc:"Soft cloth. Stops nothing, really."},
  cloth_shirt:{name:"Cloth Shirt",  ic:"👕", slot:"body", armour:2, price:30,  cat:"armour", mat:"Cloth",     desc:"A comfy shirt. Comfort over protection."},
  cloth_pants:{name:"Cloth Pants",  ic:"👖", slot:"legs", armour:1, price:20,  cat:"armour", mat:"Cloth",     desc:"Just trousers."},
  // cardboard
  card_helm:  {name:"Cardboard Helm",ic:"📦",slot:"head", armour:3, price:60,  cat:"armour", mat:"Cardboard", desc:"Surprisingly springy. Don't get it wet."},
  card_vest:  {name:"Cardboard Vest",ic:"📦",slot:"body", armour:6, price:120, cat:"armour", mat:"Cardboard", desc:"A box with arm holes. Peak ingenuity."},
  card_legs:  {name:"Cardboard Greaves",ic:"📦",slot:"legs",armour:4,price:90, cat:"armour", mat:"Cardboard", desc:"Crinkles when you walk."},
  // metal
  metal_helm: {name:"Steel Helmet", ic:"⛑️", slot:"head", armour:8, price:320, cat:"armour", mat:"Metal",     desc:"Bolted scrap steel. Heavy but solid."},
  metal_plate:{name:"Steel Plate",  ic:"🛡️", slot:"body", armour:16,price:780, cat:"armour", mat:"Metal",     desc:"A welded breastplate. Clangs when hit."},
  metal_legs: {name:"Steel Legs",   ic:"🦿", slot:"legs", armour:11,price:520, cat:"armour", mat:"Metal",     desc:"Riveted plate leggings."},
  // kevlar (best)
  kev_helm:   {name:"Kevlar Helm",  ic:"🪖", slot:"head", armour:16,price:1600,cat:"armour", mat:"Kevlar",    desc:"Modern ballistic helmet. Lightweight."},
  kev_vest:   {name:"Kevlar Vest",  ic:"🦺", slot:"body", armour:30,price:3600,cat:"armour", mat:"Kevlar",    desc:"Stops most rounds cold. The good stuff."},
  kev_legs:   {name:"Kevlar Leggings",ic:"🦵",slot:"legs",armour:21,price:2400,cat:"armour", mat:"Kevlar",    desc:"Flexible ballistic leg armour."},
};
const CONSUMABLES = {
  bandage: {name:"Bandage",   ic:"🩹", price:25,  heal:12, cat:"food", desc:"Heals 12 vitality."},
  medkit:  {name:"Med-Kit",   ic:"🧰", price:120, heal:40, cat:"food", desc:"Heals 40 vitality."},
  ammo:    {name:"Ammo Box",  ic:"📦", price:0,   cat:"misc", desc:"Spare rounds. Sells for coins."},
};
const ITEMS = Object.assign({}, WEAPONS, ARMOUR, CONSUMABLES,
  {coins:{name:"Coins", ic:"⛁", cat:"coins", desc:"Shiny money."}});
function itemKey(k){ return ITEMS[k]; }

/* ---------------- World / tile map --------------------------- */
const TILE=40, COLS=16, ROWS=16, W=COLS*TILE, H=ROWS*TILE;
// tile codes: 0 grass, 1 path, 2 water(block), 3 wall(block), 4 floor, 5 sand
const MAP = [
  "2222111111112222",
  "2221100000011222",
  "2211000440001122",
  "2110003443000112",
  "1100003443000011",
  "1000000110000001",
  "1000000110000001",
  "1115555115555111",
  "1115555115555111",
  "1000000110000001",
  "1000000110000001",
  "5500003553000055",
  "5550003553000555",
  "5555000000005555",
  "2555500000055552",
  "2255555555555522",
].map(r=>r.split("").map(Number));
function tileAt(tx,ty){ if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return 3; return MAP[ty][tx]; }
function blocked(tx,ty){ const t=tileAt(tx,ty); return t===2||t===3; }

/* ---------------- Pathfinding (BFS on grid) ------------------ */
function findPath(sx,sy,gx,gy){
  if(blocked(gx,gy)) return null;
  if(sx===gx&&sy===gy) return [];
  const key=(x,y)=>y*COLS+x;
  const came=new Map(); const q=[[sx,sy]]; came.set(key(sx,sy),null);
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(q.length){
    const [cx,cy]=q.shift();
    if(cx===gx&&cy===gy){
      const path=[]; let c=[cx,cy];
      while(c){ path.push(c); const p=came.get(key(c[0],c[1])); c=p; }
      path.reverse(); path.shift(); return path;
    }
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
      if(blocked(nx,ny)) continue;
      const k=key(nx,ny); if(came.has(k)) continue;
      came.set(k,[cx,cy]); q.push([nx,ny]);
    }
  }
  return null;
}

/* ---------------- Game state -------------------------------- */
const player = {
  px:8*TILE+TILE/2, py:6*TILE+TILE/2,   // pixel pos
  tx:8, ty:6, path:[], moveT:0, speed:150, // ms per tile
  target:null, lastShot:0, flinchUntil:0,
  hp:30, // current vitality
  skills:{
    aim:      {xp:0, lv:1},
    composure:{xp:0, lv:1},
    armour:   {xp:0, lv:1},
    vitality: {xp:xpForLevel(10), lv:10},
  },
  equip:{ weapon:"fists", head:null, body:null, legs:null },
  inv:[ {k:"zip",n:1}, {k:"bandage",n:3}, {k:"coins",n:25} ],
  facing:0, recoil:0,
};
const enemies = [];
const projectiles = []; // visual tracers {x,y,tx,ty,t,enemy}
const floaters = [];    // floating combat text
const drops = [];       // ground loot {tx,ty,k,n}

/* enemy archetypes — RS-style ascending threats */
const ENEMY_TYPES = {
  rat:    {name:"Sewer Rat",  col:"#7a6a55", r:9,  hp:6,   aim:2,  dmg:[1,2], armour:1,  fireRate:1400, range:3, xp:14,  cmb:2,  loot:[["coins",2,8,1],["ammo",1,1,.4]]},
  thug:   {name:"Street Thug",col:"#8a4b3a", r:11, hp:16,  aim:6,  dmg:[2,5], armour:4,  fireRate:1100, range:5, xp:34,  cmb:7,  loot:[["coins",5,20,1],["bandage",1,1,.35],["cloth_shirt",1,1,.08]]},
  raider: {name:"Raider",     col:"#5a6b8a", r:12, hp:34,  aim:14, dmg:[4,9], armour:10, fireRate:900,  range:6, xp:78,  cmb:18, loot:[["coins",15,55,1],["medkit",1,1,.2],["card_vest",1,1,.07],["revolver",1,1,.04]]},
  merc:   {name:"Mercenary",  col:"#3a7a4a", r:13, hp:60,  aim:28, dmg:[7,15],armour:20, fireRate:700,  range:7, xp:165, cmb:38, loot:[["coins",40,120,1],["medkit",1,2,.3],["metal_plate",1,1,.05],["smg",1,1,.04]]},
  warlord:{name:"Warlord",    col:"#7a2a6a", r:16, hp:130, aim:50, dmg:[12,26],armour:38,fireRate:550,  range:8, xp:520, cmb:78, loot:[["coins",150,400,1],["medkit",1,3,.5],["kev_vest",1,1,.06],["rifle",1,1,.05],["ak",1,1,.02]]},
};
function spawnEnemy(type,tx,ty){
  const t=ENEMY_TYPES[type];
  enemies.push({type,name:t.name,col:t.col,r:t.r,
    maxhp:t.hp,hp:t.hp,aim:t.aim,dmg:t.dmg,armour:t.armour,
    fireRate:t.fireRate,range:t.range,xp:t.xp,cmb:t.cmb,loot:t.loot,
    px:tx*TILE+TILE/2,py:ty*TILE+TILE/2,tx,ty,
    homeTx:tx,homeTy:ty,path:[],moveT:0,lastShot:0,
    target:null,dead:false,respawnAt:0,aggro:false,wanderT:0});
}
// populate the world
spawnEnemy("rat",2,2); spawnEnemy("rat",13,2); spawnEnemy("rat",3,13);
spawnEnemy("thug",12,12); spawnEnemy("thug",2,12); spawnEnemy("thug",13,4);
spawnEnemy("raider",4,4); spawnEnemy("raider",11,11);
spawnEnemy("merc",8,2); spawnEnemy("merc",2,8);
spawnEnemy("warlord",13,13);

/* ---------------- Helpers ----------------------------------- */
const cv=document.getElementById("game"), ctx2d=cv.getContext("2d");
const chatEl=document.getElementById("chat");
function log(msg,cls){ const d=document.createElement("div");
  d.className="c-"+(cls||"sys"); d.textContent=msg; chatEl.appendChild(d);
  while(chatEl.children.length>60) chatEl.removeChild(chatEl.firstChild);
  chatEl.scrollTop=chatEl.scrollHeight; }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
function tileDist(a,b){ return Math.abs(a.tx-b.tx)+Math.abs(a.ty-b.ty); }
function rand(min,max){ return min+Math.random()*(max-min); }
function randint(min,max){ return Math.floor(rand(min,max+1)); }

/* ---------------- Skills / XP ------------------------------- */
function gainXp(skill,amt){
  const s=player.skills[skill]; if(!s) return;
  const before=s.lv; s.xp+=amt; const now=levelForXp(s.xp);
  if(now>before){ s.lv=now;
    log(`Level up! Your ${skill.charAt(0).toUpperCase()+skill.slice(1)} is now ${now}.`,"xp");
    flashFloater(player.px,player.py-30,"⬆ "+skill,"#7fd06a");
  } else s.lv=now;
}
function combatLevel(){
  const s=player.skills;
  // RS-like average of combat skills
  return Math.max(3, Math.floor((s.aim.lv+s.composure.lv+s.armour.lv+s.vitality.lv)/4 + 0.5));
}
function maxHp(){ return player.skills.vitality.lv*3; }

/* ---------------- Equipment-derived stats ------------------- */
function totalArmour(){
  let a=0;
  for(const slot of ["head","body","legs"]){ const k=player.equip[slot]; if(k) a+=ITEMS[k].armour; }
  a += player.skills.armour.lv; // armour skill adds defensive value
  return a;
}
function curWeapon(){ return WEAPONS[player.equip.weapon]||WEAPONS.fists; }
// effective bloom: weapon bloom reduced by AIM. Higher aim = tighter spread.
function effectiveBloom(){
  const w=curWeapon();
  const reduce = player.skills.aim.lv/99 * 0.7; // up to 70% bloom reduction at 99
  return Math.max(2, w.bloom*(1-reduce));
}
// player flinch resist from composure
function flinchResist(){ return player.skills.composure.lv/(player.skills.composure.lv+45); }

/* ---------------- Inventory --------------------------------- */
const INV_MAX=30;
function invCount(k){ const s=player.inv.find(i=>i.k===k); return s?s.n:0; }
function addItem(k,n=1){
  if(k==="coins"){ const c=player.inv.find(i=>i.k==="coins"); if(c){c.n+=n; refreshUI(); return true;} }
  const it=ITEMS[k];
  const stackable = it.cat==="coins"||it.cat==="food"||it.cat==="misc";
  if(stackable){ const s=player.inv.find(i=>i.k===k); if(s){ s.n+=n; refreshUI(); return true; } }
  if(player.inv.length>=INV_MAX){ log("Your inventory is full.","bad"); return false; }
  player.inv.push({k,n}); refreshUI(); return true;
}
function removeItem(k,n=1){
  const i=player.inv.findIndex(x=>x.k===k); if(i<0) return;
  player.inv[i].n-=n; if(player.inv[i].n<=0) player.inv.splice(i,1); refreshUI();
}
function coins(){ return invCount("coins"); }

/* ---------------- Equip / use ------------------------------ */
function equipItem(k){
  const it=ITEMS[k]; if(!it) return;
  if(it.cat==="weapon"){
    if(player.skills.aim.lv<it.req){ log(`You need Aim level ${it.req} to wield the ${it.name}.`,"bad"); return; }
    const old=player.equip.weapon;
    player.equip.weapon=k; removeItem(k,1);
    if(old&&old!=="fists") addItem(old,1);
    log(`You wield the ${it.name}.`,"sys");
  } else if(it.cat==="armour"){
    const slot=it.slot; const old=player.equip[slot];
    player.equip[slot]=k; removeItem(k,1);
    if(old) addItem(old,1);
    log(`You put on the ${it.name}.`,"sys");
  }
  refreshUI();
}
function useItem(k){
  const it=ITEMS[k]; if(!it) return;
  if(it.cat==="food"){
    if(player.hp>=maxHp()){ log("You're already at full health.","sys"); return; }
    player.hp=Math.min(maxHp(),player.hp+it.heal); removeItem(k,1);
    flashFloater(player.px,player.py-20,"+"+it.heal,"#7fd06a");
    log(`You use the ${it.name} and heal ${it.heal}.`,"loot");
  } else if(it.cat==="weapon"||it.cat==="armour"){ equipItem(k); }
  refreshUI();
}
function dropItem(k){ removeItem(k,1); drops.push({tx:player.tx,ty:player.ty,k,n:1}); log(`You drop the ${ITEMS[k].name}.`,"sys"); }

/* ---------------- Combat ----------------------------------- */
function startAttack(enemy){ player.target=enemy; enemy.aggro=true; }
function tryShoot(now){
  const e=player.target; if(!e||e.dead) {player.target=null; return;}
  const w=curWeapon();
  const d=tileDist(player,e);
  if(d>w.range){ moveTowards(e.tx,e.ty); return; }   // close the distance
  // in range: stop and fire
  if(player.path.length){ player.path=[]; }
  faceTo(e.px,e.py);
  if(now-player.lastShot < w.fireRate) return;
  if(now < player.flinchUntil) return; // flinched, can't fire yet
  player.lastShot=now; player.recoil=1;
  // hit chance: tighter bloom + closer range + lower enemy armour = more likely
  const bloom=effectiveBloom();
  const rangePen = d/w.range*8;
  const acc = 100/(1+bloom*0.06+rangePen*0.05);  // 0..100-ish
  const def = e.armour;
  const hitChance = acc/(acc+def);
  spawnTracer(player.px,player.py,e.px,e.py);
  if(Math.random()<hitChance){
    const dmg=randint(w.dmgMin,w.dmgMax);
    e.hp-=dmg; flashFloater(e.px,e.py-e.r-6,dmg,"#ffd24a");
    gainXp("aim", dmg*4); gainXp("composure", dmg*2); gainXp("vitality", Math.round(dmg*1.33));
    if(e.hp<=0){ killEnemy(e); }
  } else {
    flashFloater(e.px,e.py-e.r-6,"miss","#cccccc");
    gainXp("aim", 2);
  }
}
function killEnemy(e){
  e.dead=true; e.respawnAt=performance.now()+8000;
  player.target=null;
  log(`You killed the ${e.name}.`,"cmb");
  gainXp("aim", e.xp*0.4); gainXp("composure", e.xp*0.3); gainXp("vitality", e.xp*0.3);
  // loot
  for(const [k,min,max,chance] of e.loot){
    if(Math.random()<chance){ const n=randint(min,max);
      drops.push({tx:e.tx,ty:e.ty,k,n}); }
  }
}
function enemyShoot(e,now){
  if(now-e.lastShot < e.fireRate) return;
  e.lastShot=now;
  spawnTracer(e.px,e.py,player.px,player.py,true);
  const acc=e.aim+8; const def=totalArmour();
  const hitChance=acc/(acc+def);
  if(Math.random()<hitChance){
    let dmg=randint(e.dmg[0],e.dmg[1]);
    // armour soaks a little flat damage
    dmg=Math.max(1, dmg-Math.floor(totalArmour()*0.12));
    player.hp-=dmg;
    flashFloater(player.px,player.py-26,dmg,"#ff6a5a");
    gainXp("armour", dmg*3); gainXp("composure", dmg*1.5);
    // flinch check (composure resists)
    if(Math.random()>flinchResist()){
      player.flinchUntil=now+450; player.recoil=0.6;
      flashFloater(player.px,player.py-40,"flinch!","#ff9b5a");
    }
    if(player.hp<=0) playerDeath();
  } else {
    flashFloater(player.px,player.py-26,"miss","#aaaaaa");
  }
}
function playerDeath(){
  log("Oh dear, you are dead!","bad");
  player.hp=maxHp(); player.target=null; player.path=[];
  player.tx=8; player.ty=6; player.px=8*TILE+TILE/2; player.py=6*TILE+TILE/2;
  player.flinchUntil=0;
  // drop a little: lose half coins
  const c=coins(); if(c>0){ const lost=Math.floor(c/2); removeItem("coins",lost);
    log(`You dropped ${lost} coins where you fell.`,"bad"); }
  refreshUI();
}

/* ---------------- Movement --------------------------------- */
function moveTo(tx,ty){
  const p=findPath(player.tx,player.ty,tx,ty);
  if(p===null){ return false; }
  player.path=p; return true;
}
function moveTowards(tx,ty){
  // path to an adjacent tile of target if target tile blocked-ish
  if(player.path.length) return;
  const p=findPath(player.tx,player.ty,tx,ty);
  if(p&&p.length){ player.path=p.slice(0,Math.max(1,p.length-0)); }
}
function faceTo(x,y){ player.facing=Math.atan2(y-player.py,x-player.px); }

/* ---------------- Visual fx -------------------------------- */
function spawnTracer(x,y,tx,ty,enemy){ projectiles.push({x,y,tx,ty,t:0,enemy}); }
function flashFloater(x,y,txt,col){ floaters.push({x,y,txt:String(txt),col,t:0}); }

/* ---------------- Update loop ------------------------------ */
let last=performance.now();
function update(now){
  const dt=now-last; last=now;

  // player movement along path
  if(player.path.length && now>=player.moveT && now>=player.flinchUntil){
    const [nx,ny]=player.path[0];
    player.tx=nx; player.ty=ny; player.moveT=now+player.speed;
    player.path.shift();
  }
  // smoothly lerp pixel pos to tile center
  const targX=player.tx*TILE+TILE/2, targY=player.ty*TILE+TILE/2;
  player.px+=(targX-player.px)*Math.min(1,dt/120);
  player.py+=(targY-player.py)*Math.min(1,dt/120);
  if(player.recoil>0) player.recoil=Math.max(0,player.recoil-dt/180);

  // pick up drops on our tile
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(d.tx===player.tx&&d.ty===player.ty){
      if(addItem(d.k,d.n)){ log(`You pick up ${d.n>1?d.n+" ":""}${ITEMS[d.k].name}.`,"loot"); drops.splice(i,1); }
    }
  }

  // combat: shooting target
  if(player.target && !player.target.dead) tryShoot(now);

  // enemies
  for(const e of enemies){
    if(e.dead){ if(now>=e.respawnAt){ // respawn
        e.dead=false; e.hp=e.maxhp; e.tx=e.homeTx; e.ty=e.homeTy;
        e.px=e.tx*TILE+TILE/2; e.py=e.ty*TILE+TILE/2; e.aggro=false; e.target=null; e.path=[];
      } continue; }
    const dToPlayer=tileDist(e,player);
    // aggression
    if(e.aggro && player.target!==e && dToPlayer>e.range+4){ e.aggro=false; }
    if(player.target===e) e.aggro=true;
    if(e.aggro){
      if(dToPlayer<=e.range){
        if(e.path.length) e.path=[];
        enemyShoot(e,now);
      } else if(now>=e.moveT){
        // chase
        if(!e.path.length){ const p=findPath(e.tx,e.ty,player.tx,player.ty); if(p&&p.length) e.path=p.slice(0,p.length-1).length?p:p; }
        if(e.path.length){ const [nx,ny]=e.path[0]; e.tx=nx;e.ty=ny;e.moveT=now+700; e.path.shift(); }
      }
    } else {
      // wander near home
      if(now>=e.wanderT){
        e.wanderT=now+rand(2000,5000);
        const nx=e.homeTx+randint(-2,2), ny=e.homeTy+randint(-2,2);
        if(!blocked(nx,ny)){ const p=findPath(e.tx,e.ty,nx,ny); if(p&&p.length) e.path=p; }
      }
      if(e.path.length && now>=e.moveT){ const [nx,ny]=e.path[0]; e.tx=nx;e.ty=ny;e.moveT=now+900; e.path.shift(); }
    }
    // lerp enemy pixels
    const ex=e.tx*TILE+TILE/2, ey=e.ty*TILE+TILE/2;
    e.px+=(ex-e.px)*Math.min(1,dt/150); e.py+=(ey-e.py)*Math.min(1,dt/150);
  }

  // hp regen (slow, out of combat)
  if(!player.target && player.hp<maxHp()){ player._regen=(player._regen||0)+dt;
    if(player._regen>3000){ player._regen=0; player.hp=Math.min(maxHp(),player.hp+1); } }

  // tracers
  for(let i=projectiles.length-1;i>=0;i--){ const p=projectiles[i]; p.t+=dt/90; if(p.t>=1) projectiles.splice(i,1); }
  // floaters
  for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i]; f.t+=dt; f.y-=dt*0.02; if(f.t>900) floaters.splice(i,1); }

  // refresh dynamic HUD bits occasionally
  hudTick+=dt; if(hudTick>200){ hudTick=0; updateTopBar(); if(activeTab==="skills"||activeTab==="equip") refreshUI(); }

  render();
  requestAnimationFrame(update);
}
let hudTick=0;

/* ---------------- Render ----------------------------------- */
const TILE_COL={0:"#4a6b3a",1:"#9b8552",4:"#6b5436",5:"#b8a06a"};
function render(){
  ctx2d.clearRect(0,0,W,H);
  // tiles
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=MAP[y][x];
    if(t===2){ ctx2d.fillStyle="#2a4a7a"; }
    else if(t===3){ ctx2d.fillStyle="#444038"; }
    else ctx2d.fillStyle=TILE_COL[t]||"#4a6b3a";
    ctx2d.fillRect(x*TILE,y*TILE,TILE,TILE);
    // subtle grid + texture
    ctx2d.fillStyle="rgba(0,0,0,0.06)";
    if((x+y)%2===0) ctx2d.fillRect(x*TILE,y*TILE,TILE,TILE);
    if(t===3){ ctx2d.fillStyle="#5a554a"; ctx2d.fillRect(x*TILE+3,y*TILE+3,TILE-6,TILE-6); }
  }
  // drops
  for(const d of drops){
    const cx=d.tx*TILE+TILE/2, cy=d.ty*TILE+TILE/2;
    ctx2d.font="18px serif"; ctx2d.textAlign="center"; ctx2d.textBaseline="middle";
    ctx2d.fillText(ITEMS[d.k].ic, cx, cy);
    // shimmer
    ctx2d.fillStyle="rgba(255,210,74,"+(0.3+0.2*Math.sin(performance.now()/200))+")";
    ctx2d.beginPath(); ctx2d.arc(cx,cy,3,0,7); ctx2d.fill();
  }
  // path markers
  if(player.path.length){
    ctx2d.fillStyle="rgba(255,255,0,0.25)";
    for(const [px,py] of player.path) ctx2d.fillRect(px*TILE+TILE*0.4,py*TILE+TILE*0.4,TILE*0.2,TILE*0.2);
    const last=player.path[player.path.length-1];
    ctx2d.strokeStyle="#ff0"; ctx2d.lineWidth=2;
    ctx2d.strokeRect(last[0]*TILE+4,last[1]*TILE+4,TILE-8,TILE-8);
  }
  // enemies
  for(const e of enemies){ if(e.dead) continue; drawEnemy(e); }
  // tracers
  for(const p of projectiles){
    const x=p.x+(p.tx-p.x)*p.t, y=p.y+(p.ty-p.y)*p.t;
    ctx2d.strokeStyle=p.enemy?"rgba(255,80,60,0.8)":"rgba(255,230,120,0.9)";
    ctx2d.lineWidth=2; ctx2d.beginPath();
    const bx=p.x+(p.tx-p.x)*Math.max(0,p.t-0.15), by=p.y+(p.ty-p.y)*Math.max(0,p.t-0.15);
    ctx2d.moveTo(bx,by); ctx2d.lineTo(x,y); ctx2d.stroke();
  }
  // player
  drawPlayer();
  // floaters
  ctx2d.textAlign="center"; ctx2d.textBaseline="middle";
  for(const f of floaters){
    ctx2d.font="bold 14px Trebuchet MS";
    ctx2d.globalAlpha=Math.max(0,1-f.t/900);
    ctx2d.fillStyle="#000"; ctx2d.fillText(f.txt,f.x+1,f.y+1);
    ctx2d.fillStyle=f.col; ctx2d.fillText(f.txt,f.x,f.y);
    ctx2d.globalAlpha=1;
  }
}
function healthBar(x,y,w,frac,col){
  ctx2d.fillStyle="#000"; ctx2d.fillRect(x-1,y-1,w+2,6);
  ctx2d.fillStyle="#3a0f0c"; ctx2d.fillRect(x,y,w,4);
  ctx2d.fillStyle=col; ctx2d.fillRect(x,y,w*Math.max(0,frac),4);
}
function drawEnemy(e){
  // body
  ctx2d.fillStyle=e.col;
  ctx2d.beginPath(); ctx2d.arc(e.px,e.py,e.r,0,7); ctx2d.fill();
  ctx2d.strokeStyle="#1c1712"; ctx2d.lineWidth=2; ctx2d.stroke();
  // gun nub toward player
  const a=Math.atan2(player.py-e.py,player.px-e.px);
  ctx2d.strokeStyle="#1c1712"; ctx2d.lineWidth=3;
  ctx2d.beginPath(); ctx2d.moveTo(e.px,e.py);
  ctx2d.lineTo(e.px+Math.cos(a)*(e.r+6),e.py+Math.sin(a)*(e.r+6)); ctx2d.stroke();
  // name + hp
  healthBar(e.px-e.r,e.py-e.r-12,e.r*2,e.hp/e.maxhp,e.aggro?"#ff5a4a":"#5aa84c");
  ctx2d.font="10px Trebuchet MS"; ctx2d.textAlign="center"; ctx2d.fillStyle="#fff";
  ctx2d.fillText(e.name+" (lv "+e.cmb+")",e.px,e.py-e.r-18);
}
function drawPlayer(){
  const x=player.px,y=player.py;
  // shadow
  ctx2d.fillStyle="rgba(0,0,0,0.3)"; ctx2d.beginPath(); ctx2d.ellipse(x,y+10,12,5,0,0,7); ctx2d.fill();
  // body
  ctx2d.fillStyle = performance.now()<player.flinchUntil ? "#d88" : "#4a90d9";
  ctx2d.beginPath(); ctx2d.arc(x,y,12,0,7); ctx2d.fill();
  ctx2d.strokeStyle="#fff"; ctx2d.lineWidth=2; ctx2d.stroke();
  // gun
  const a=player.facing; const len=14-player.recoil*5;
  ctx2d.strokeStyle="#222"; ctx2d.lineWidth=4;
  ctx2d.beginPath(); ctx2d.moveTo(x,y); ctx2d.lineTo(x+Math.cos(a)*(12+len),y+Math.sin(a)*(12+len)); ctx2d.stroke();
  // muzzle flash on recoil
  if(player.recoil>0.7){ ctx2d.fillStyle="rgba(255,220,120,0.9)";
    ctx2d.beginPath(); ctx2d.arc(x+Math.cos(a)*(26),y+Math.sin(a)*(26),5,0,7); ctx2d.fill(); }
  // hp bar
  healthBar(x-16,y-22,32,player.hp/maxHp(),"#5aa84c");
  ctx2d.font="10px Trebuchet MS"; ctx2d.textAlign="center"; ctx2d.fillStyle="#fff";
  ctx2d.fillText("You",x,y-28);
}

function refreshUI(){
  if(activeTab==="skills") renderSkills();
  else if(activeTab==="inv") renderInv();
  else if(activeTab==="equip") renderEquip();
  else if(activeTab==="shop") renderShop();

function skillRow(key,label,desc){
  const s=player.skills[key];
  const cur=xpForLevel(s.lv), next=xpForLevel(Math.min(99,s.lv+1));
  const frac= s.lv>=99?1:(s.xp-cur)/Math.max(1,(next-cur));
  return `<div class="skill" data-tip="skill:${key}">
    <div class="nm">${label}</div>
    <div class="lv">${s.lv}<small>/99</small></div>
    <div class="bar"><i style="width:${Math.round(frac*100)}%"></i></div></div>`;
}

let shopFilter="weapon";
function renderShop(){
  const cats=[["weapon","Guns"],["armour","Armour"],["food","Supplies"]];
  let tabs=`<div style="display:flex;gap:4px;margin-bottom:8px">`;

    const sub = it.cat==="weapon"?`${reqTxt}${it.dmgMin}–${it.dmgMax} dmg`:

function buy(k){ const it=ITEMS[k]; if(coins()<it.price){ log("You can't afford that.","bad"); return; }
  if(player.inv.length>=INV_MAX && !["food"].includes(it.cat)){ log("Not enough inventory space.","bad"); return; }
  removeItem("coins",it.price); addItem(k,1); log(`You buy the ${it.name}.`,"loot"); refreshUI(); }
function sellValue(k){ const it=ITEMS[k]; return Math.max(1,Math.floor((it.price||5)*0.4)); }
function sell(k){ const v=sellValue(k); removeItem(k,1); addItem("coins",v); log(`You sell the ${ITEMS[k].name} for ⛁${v}.`,"loot"); refreshUI(); }

/* ---------------- Tooltips & context menu ------------------ */

function showTip(ev,spec){
  const [type,key]=spec.split(":");
  let html="";
  if(type==="item"){ const d=ITEMS[key]; if(!d) return;
    let lines="";
    if(d.cat==="weapon") lines=`<div class="tline">Damage ${d.dmgMin}–${d.dmgMax} · ${(1000/d.fireRate).toFixed(1)}/s · range ${d.range}</div><div class="tline">Bloom ${d.bloom} · needs Aim ${d.req}</div>`;
    else if(d.cat==="armour") lines=`<div class="tline">${d.mat} · ${d.slot} · +${d.armour} armour</div>`;
    else if(d.cat==="food") lines=`<div class="tline">Heals ${d.heal} vitality</div>`;
    html=`<div class="tnm">${d.ic} ${d.name}</div>${lines}<div class="tdesc">${d.desc||""}</div>`;
  } else if(type==="skill"){
    const s=player.skills[key];
    html=`<div class="tnm">${key.charAt(0).toUpperCase()+key.slice(1)}</div>
      <div class="tline">Level ${s.lv} · ${Math.floor(s.xp)} xp</div>
      <div class="tline">Next: ${s.lv>=99?"max":xpForLevel(s.lv+1)+" xp"}</div>`;
  }
  tip.innerHTML=html; tip.style.display="block";
  tip.style.left=Math.min(ev.clientX+14,window.innerWidth-250)+"px";
  tip.style.top=(ev.clientY+14)+"px";
}
const ctxEl=document.getElementById("ctx");
function showItemCtx(ev,k){
  const it=ITEMS[k]; let opts=[];
  if(it.cat==="weapon"||it.cat==="armour") opts.push(["Equip",()=>equipItem(k)]);
  if(it.cat==="food") opts.push(["Use",()=>useItem(k)]);
  if(k!=="coins") opts.push(["Sell ("+sellValue(k)+")",()=>sell(k)]);
  if(k!=="coins") opts.push(["Drop",()=>dropItem(k)]);
  opts.push(["Examine",()=>log(it.name+": "+(it.desc||"An item."),"sys")]);
  ctxEl.innerHTML=""; for(const [label,fn] of opts){ const d=document.createElement("div");
    d.textContent=label; d.onclick=()=>{fn();ctxEl.style.display="none";}; ctxEl.appendChild(d); }
  ctxEl.style.display="block";
  ctxEl.style.left=Math.min(ev.clientX,window.innerWidth-140)+"px";
  ctxEl.style.top=ev.clientY+"px";
}
document.addEventListener("click",()=>ctxEl.style.display="none");

/* ---------------- Canvas input ----------------------------- */
cv.addEventListener("contextmenu",e=>e.preventDefault());
cv.addEventListener("mousedown",e=>{
  if(e.button!==0) return;
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  // clicked an enemy?
  for(const en of enemies){ if(en.dead) continue;
    if(dist(mx,my,en.px,en.py)<=en.r+4){ startAttack(en); log(`You attack the ${en.name}.`,"cmb"); return; } }
  // clicked a drop?
  const dtx=Math.floor(mx/TILE), dty=Math.floor(my/TILE);
  // walk there
  player.target=null;
  if(!blocked(dtx,dty)) moveTo(dtx,dty);
});
cv.addEventListener("mousemove",e=>{
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  let over=false;
  for(const en of enemies){ if(en.dead) continue; if(dist(mx,my,en.px,en.py)<=en.r+4){ over=true; break; } }
  cv.style.cursor=over?"pointer":"crosshair";
});

/* ---------------- Boot ------------------------------------- */
log("Welcome to Gunscape Classic!","sys");
log("Train Aim & Composure by fighting. Buy bigger guns from the shop.","sys");
log("Goal: work up to the mighty AK-47 (Aim 45).","sys");
refreshUI();
requestAnimationFrame(update);
</script>
