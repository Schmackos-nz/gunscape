# fly.toml app configuration file generated for gunscape-game on 2026-06-21T08:37:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gunscape-game'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  ADMINS = 'admin'
  PORT = '8787'

[[mounts]]
  source = 'gunscape_data'
  destination = '/data'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
