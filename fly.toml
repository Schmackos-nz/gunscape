# Fly.io config for the Gunscape dedicated server.
# Pick a globally-unique name below, then: fly deploy
app = "gunscape-server"          # CHANGE ME to your own unique app name
primary_region = "iad"           # pick a region near you (e.g. iad, lhr, syd) — `fly platform regions`

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  ADMINS = "admin"               # comma-separated admin usernames

# Fly terminates TLS and proxies 443 -> internal_port, so wss:// works automatically.
[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"     # keep the shared world running 24/7
  auto_start_machines = true
  min_machines_running = 1

# Persistent disk so accounts.json (characters) survive restarts/deploys.
[[mounts]]
  source = "gunscape_data"
  destination = "/data"
